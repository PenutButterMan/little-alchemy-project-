<!DOCTYPE html>
<html>
<head>

    <!--
        Element Combiner game HTML structure.
        - Loads the CSS styles for the app.
        - Loads the Supabase client library.
    -->
    <title>⚱ Alchemical Forge ⚱</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

    <!-- Page title -->
    <h1>⚱ Alchemical Forge ⚱</h1>

    <!-- Main app container: element list + combine area + result -->
    <div class="container">
      <!-- Left panel: available elements to drag -->
      <div class="elements-section">
        <h2>⚗️ Available Elements</h2>
        <div id="elementsList" class="elements-list"></div>
      </div>

      <!-- Center panel: free-form combination area -->
      <div class="combine-section">
        <h2>⚱ Alchemical Cauldron</h2>
        <p class="instructions">Drag elements from the left into the cauldron, then move them together to combine.</p>
        <div id="combineArea" class="combine-area"></div>
        <button id="clearBtn" class="clear-btn">Clear All</button>
      </div>

      <!-- Bottom panel: show current result -->
      <div class="result-section">
        <h2 id="result">✨ Result: </h2>
      </div>
    </div>

    <!-- Load Supabase configuration and game logic -->
    <script src="supabaseClient.js"></script>
    <script src="script.js"></script>

</body>
</html>
